<style>
	.wrapper.bg {
  /* Starting position: off-bottom of the screen */
  transform: translateY(100vh); 
  
  /* Animation: name, duration, timing, and 'forwards' to stay in place */
  animation: move-up 5s ease-out forwards;
  
  /* Ensure it stays behind the neon text */
  position: relative;
  z-index: 1; 
}

@keyframes move-up {
  0% {
    transform: translateY(100vh);
  }
  100% {
    /* Final position: adjust this value to align perfectly behind your sign */
    transform: translateY(-70%); 
  }
}

/* Ensure your neon container stays on top */
#hiddenTitle, .container {
  position: relative;
  z-index: 10;
}


</style>
